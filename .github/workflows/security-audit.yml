name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
          
      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run Audit
        working-directory: app
        # Fail only on critical vulnerabilities in production dependencies
        # xlsx is a dev dependency with known issues, so we might need to filter or accept this for now
        # Ideally: npm audit --audit-level=high --production
        run: npm audit --audit-level=critical --production
