<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0057B7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d82;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Ukrainian flag accent - top stripe -->
  <rect x="0" y="0" width="1200" height="15" fill="#FFD700" />

  <!-- Main title -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="1">
    Action For Ukraine
  </text>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="rgba(255, 255, 255, 0.9)" letter-spacing="0.5">
    Email your MP to support Ukraine in seconds
  </text>

  <!-- Decorative bottom accent line -->
  <rect x="300" y="420" width="600" height="3" fill="#FFD700" rx="1.5" />

  <!-- Ukrainian flag accent - small bottom stripe -->
  <rect x="0" y="615" width="1200" height="15" fill="#FFD700" />
</svg>
